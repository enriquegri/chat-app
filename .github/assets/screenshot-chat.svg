<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="720" fill="#1a1a2e"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="720" fill="#12122a"/>

  <!-- Sidebar header -->
  <rect x="0" y="0" width="240" height="56" fill="#0e0e22"/>
  <text x="20" y="34" fill="#ffffff" font-size="16" font-weight="700">ChatApp</text>
  <circle cx="210" cy="28" r="14" fill="#5b5ef4"/>
  <text x="204" y="33" fill="#ffffff" font-size="13">✎</text>

  <!-- Channels label -->
  <text x="20" y="82" fill="#8888aa" font-size="11" font-weight="600" letter-spacing="1">CANALES</text>

  <!-- Channel items -->
  <rect x="0" y="90" width="240" height="36" fill="#5b5ef4" rx="0"/>
  <text x="20" y="113" fill="#ffffff" font-size="14"># general</text>
  <circle cx="220" cy="108" r="9" fill="#ef4444"/>
  <text x="215" y="112" fill="#ffffff" font-size="10">3</text>

  <text x="20" y="148" fill="#8888aa" font-size="14"># desarrollo</text>
  <text x="20" y="184" fill="#8888aa" font-size="14"># diseño</text>
  <text x="20" y="220" fill="#8888aa" font-size="14"># random</text>

  <!-- DMs label -->
  <text x="20" y="258" fill="#8888aa" font-size="11" font-weight="600" letter-spacing="1">MENSAJES DIRECTOS</text>

  <!-- DM items -->
  <circle cx="32" cy="280" r="10" fill="#22c55e"/>
  <text x="50" y="285" fill="#ccccdd" font-size="13">Ana García</text>
  <circle cx="210" cy="280" r="5" fill="#22c55e"/>

  <circle cx="32" cy="312" r="10" fill="#5b5ef4"/>
  <text x="50" y="317" fill="#8888aa" font-size="13">Carlos M.</text>

  <circle cx="32" cy="344" r="10" fill="#f59e0b"/>
  <text x="50" y="349" fill="#8888aa" font-size="13">Laura P.</text>

  <!-- Voice call bar in sidebar -->
  <rect x="0" y="640" width="240" height="80" fill="#0e0e22"/>
  <rect x="8" y="648" width="224" height="64" fill="#1e1e3a" rx="8"/>
  <text x="20" y="668" fill="#22c55e" font-size="11" font-weight="600">🔊 EN LLAMADA · general</text>
  <circle cx="30" cy="690" r="12" fill="#5b5ef4"/>
  <text x="24" y="695" fill="#fff" font-size="11">A</text>
  <circle cx="56" cy="690" r="12" fill="#f59e0b"/>
  <text x="50" y="695" fill="#fff" font-size="11">C</text>
  <circle cx="82" cy="690" r="12" fill="#22c55e"/>
  <text x="76" y="695" fill="#fff" font-size="11">L</text>

  <!-- Main chat area -->
  <rect x="240" y="0" width="960" height="720" fill="#1a1a2e"/>

  <!-- Chat header -->
  <rect x="240" y="0" width="960" height="56" fill="#151528"/>
  <text x="264" y="34" fill="#ffffff" font-size="16" font-weight="700"># general</text>
  <text x="370" y="34" fill="#8888aa" font-size="13">· 24 miembros online</text>

  <!-- Header icons -->
  <text x="1100" y="35" fill="#8888aa" font-size="20">📞</text>
  <text x="1140" y="35" fill="#8888aa" font-size="20">🔍</text>

  <!-- Voice call bar -->
  <rect x="240" y="56" width="960" height="52" fill="#1e1e3a"/>
  <rect x="250" y="62" width="940" height="40" fill="#252545" rx="8"/>
  <text x="270" y="87" fill="#8888aa" font-size="13">🔊 3 en llamada —</text>
  <circle cx="390" cy="82" r="13" fill="#5b5ef4"/>
  <text x="383" y="87" fill="#fff" font-size="12">A</text>
  <circle cx="418" cy="82" r="13" fill="#f59e0b"/>
  <text x="411" y="87" fill="#fff" font-size="12">C</text>
  <circle cx="446" cy="82" r="13" fill="#22c55e"/>
  <text x="440" y="87" fill="#fff" font-size="12">L</text>
  <rect x="1080" y="66" width="100" height="30" fill="#5b5ef4" rx="6"/>
  <text x="1103" y="86" fill="#ffffff" font-size="13" font-weight="600">Unirse</text>

  <!-- Messages -->
  <!-- Message 1 -->
  <circle cx="272" cy="152" r="18" fill="#5b5ef4"/>
  <text x="263" y="157" fill="#fff" font-size="14">A</text>
  <text x="300" y="142" fill="#ffffff" font-size="13" font-weight="600">Ana García</text>
  <text x="380" y="142" fill="#555577" font-size="11">10:24</text>
  <text x="300" y="162" fill="#ccccdd" font-size="14">Buenos días a todos! 👋</text>

  <!-- Message 2 -->
  <circle cx="272" cy="208" r="18" fill="#f59e0b"/>
  <text x="265" y="213" fill="#fff" font-size="14">C</text>
  <text x="300" y="198" fill="#ffffff" font-size="13" font-weight="600">Carlos M.</text>
  <text x="380" y="198" fill="#555577" font-size="11">10:25</text>
  <text x="300" y="218" fill="#ccccdd" font-size="14">¡Hola! ¿Revisasteis el deploy de ayer?</text>

  <!-- Message 3 with image -->
  <circle cx="272" cy="264" r="18" fill="#5b5ef4"/>
  <text x="263" y="269" fill="#fff" font-size="14">A</text>
  <text x="300" y="254" fill="#ffffff" font-size="13" font-weight="600">Ana García</text>
  <text x="380" y="254" fill="#555577" font-size="11">10:26</text>
  <text x="300" y="274" fill="#ccccdd" font-size="14">Sí, todo OK. Os comparto los logs:</text>
  <rect x="300" y="282" width="280" height="80" fill="#252545" rx="8"/>
  <rect x="300" y="282" width="6" height="80" fill="#5b5ef4" rx="3"/>
  <text x="316" y="302" fill="#8888aa" font-size="11">archivo.log · 12 KB</text>
  <text x="316" y="322" fill="#ccccdd" font-size="12">[2024] Server started on :8080</text>
  <text x="316" y="340" fill="#ccccdd" font-size="12">[2024] Connected to MariaDB</text>
  <text x="316" y="352" fill="#8888aa" font-size="10">...</text>

  <!-- Reactions on message 3 -->
  <rect x="300" y="368" width="54" height="24" fill="#2a2a4a" rx="12"/>
  <text x="310" y="385" fill="#ccccdd" font-size="13">👍 2</text>
  <rect x="360" y="368" width="54" height="24" fill="#2a2a4a" rx="12"/>
  <text x="370" y="385" fill="#ccccdd" font-size="13">🚀 1</text>

  <!-- Message 4 with reply -->
  <circle cx="272" cy="430" r="18" fill="#22c55e"/>
  <text x="266" y="435" fill="#fff" font-size="14">L</text>
  <text x="300" y="420" fill="#ffffff" font-size="13" font-weight="600">Laura P.</text>
  <text x="380" y="420" fill="#555577" font-size="11">10:28</text>
  <!-- Reply snippet -->
  <rect x="300" y="428" width="300" height="28" fill="#1e1e3a" rx="4"/>
  <rect x="300" y="428" width="3" height="28" fill="#5b5ef4" rx="1"/>
  <text x="310" y="445" fill="#8888aa" font-size="11">↩ Ana García: Sí, todo OK. Os comparto...</text>
  <text x="300" y="472" fill="#ccccdd" font-size="14">Perfecto, gracias por los logs 🙌</text>

  <!-- Message 5 -->
  <circle cx="272" cy="510" r="18" fill="#f59e0b"/>
  <text x="265" y="515" fill="#fff" font-size="14">C</text>
  <text x="300" y="500" fill="#ffffff" font-size="13" font-weight="600">Carlos M.</text>
  <text x="380" y="500" fill="#555577" font-size="11">10:31</text>
  <text x="300" y="520" fill="#ccccdd" font-size="14">¿Alguien se apunta a la llamada de las 11?</text>

  <!-- Typing indicator -->
  <text x="264" y="560" fill="#8888aa" font-size="12" font-style="italic">Ana está escribiendo...</text>

  <!-- Input bar -->
  <rect x="240" y="655" width="960" height="65" fill="#151528"/>
  <rect x="260" y="665" width="900" height="44" fill="#252545" rx="10"/>
  <text x="280" y="692" fill="#555577" font-size="14">Escribe un mensaje en #general...</text>
  <text x="1100" y="694" fill="#8888aa" font-size="20">📎</text>
  <text x="1135" y="694" fill="#8888aa" font-size="20">😊</text>
</svg>
