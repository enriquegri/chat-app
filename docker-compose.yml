version: '3.8'

services:
  mariadb:
    image: mariadb:10.5
    container_name: chat-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-chatapp}
      MYSQL_USER: ${DB_USER:-chatapp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-chatapppass}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-chatapp}
      DB_PASSWORD: ${DB_PASSWORD:-chatapppass}
      DB_NAME: ${DB_NAME:-chatapp}
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PUBLIC_URL: ${PUBLIC_URL:-https://api.enriquegr.dev}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mariadb:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    container_name: chat-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  mariadb_data:
  uploads_data:

networks:
  default:
    name: chat-network
